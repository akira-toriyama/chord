# chord — user configuration template
# https://github.com/akira-toriyama/chord
#
# This file is the **single source of truth** for chord's bindings.
# chord does NOT ship a GUI. Drop your edited copy at
# ~/.config/chord/config.toml:
#
#   curl --create-dirs -o ~/.config/chord/config.toml \
#     https://raw.githubusercontent.com/akira-toriyama/chord/main/config.toml
#
# chord only ever READS this file. Bindings whose `input` or
# `action-*` fails to parse are *dropped with a warning* rather than
# rejected — a typo can never break the daemon. Validate explicitly
# with `chord --validate` (or `chord --validate --strict` in CI).
#
# **Everything below is commented out by design.** The shipped
# template intentionally fires nothing on first install; uncomment
# the patterns you want. The examples are grouped by use case —
# pick the ones that match how you actually work.


# =====================================================================
# Global options
# =====================================================================
[options]

# Pass unmatched events through to the OS. The default (true) is what
# you want unless chord is being used as a key-filter layer.
passthrough-unmatched = true

# Bundle IDs where chord is globally disabled. Useful for apps that
# already have their own gesture engine (Xcode, video editors, games).
# Glob (`*` / `?`) supported.
exclude-apps = []


# =====================================================================
# Grammar reference
# =====================================================================
# `input` syntax:
#
#   • keys:     "cmd + ctrl - f13"
#   • mouse:    "mouse.side1"               (left | right | middle | side1 | side2)
#   • scroll:   "ctrl - scroll.up"          (up | down | left | right)
#
# Modifier names:
#   cmd | opt (= alt) | ctrl | shift | fn | hyper (= cmd+opt+ctrl+shift)
#
# Side-specific (ZMK ULTRA_LL / Karabiner-style strict layers):
#   lcmd / rcmd | lopt / ropt (= lalt / ralt) | lctrl / rctrl |
#   lshift / rshift
#   Use the any-side spelling (`ctrl`, `cmd`, …) unless the side
#   actually matters — that's almost always what you want.
#
# Key names: a-z, 0-9, f1-f24, return, space, esc, tab, backspace,
#   delete (= backspace), forward_delete (= ⌦), arrow_{up,down,left,right},
#   page_{up,down}, home, end, caps_lock, kp_0…kp_9 …
#   See Sources/ChordCore/KeyCodes.swift for the full table.
#   Anything else: use `keycode-N` (raw CGKeyCode).
#
# Exactly ONE primary action per binding:
#   action-shell    = "open -a Terminal"     — runs in /bin/zsh -l -c
#   action-keys     = "cmd + shift - 4"      — chord posts these keys
#   action-noop     = true                    — eats the event
#   action-set-var  = "wm"                    — v2: sets wm = 1
#                                                (use action-set-value=N for ≠1)
#
# Optional secondary action that fires on the key's release:
#   action-shell-on-up = "…"
#   action-keys-on-up  = "…"
#   action-set-var-on-up = "…"  (+ action-set-value-on-up)
# Both halves are implicitly consumed — the OS sees neither.
#
# Optional state-gate (v2):
#   when-var       = "wm"        — binding fires only when wm == 1
#   when-var-value = 1            — default; set to 0 to mean
#                                    "fire only when the variable
#                                    is cleared or unset"
#
# Optional variable lifecycle (v2 — meaningful with action-set-var):
#   hold-while = "cmd + opt"      — variable auto-clears when this
#                                    modifier mask is no longer held.
#                                    Only useful when modifiers stay
#                                    physically held across keystrokes.
#   hold-while-timeout = 800       — (recommended for ZMK / Karabiner
#                                    setups whose firmware fires
#                                    modifier chords atomically)
#                                    inactivity timer (ms). Reset every
#                                    time a binding gated on the same
#                                    variable fires. Vim's `timeoutlen`
#                                    semantics.
#   (mutually exclusive — write one or neither, not both)
#
# Shell actions get these env vars:
#   CHORD_BINDING_NAME, CHORD_FRONTMOST_BUNDLE_ID


# =====================================================================
# Pattern 1 — F13-F24 as launcher keys
# =====================================================================
# Useful if you have a programmable keyboard (ZSA Moonlander, custom
# QMK, etc.) or a remapper (Karabiner) that sends F13–F24. Most
# physical F-row keyboards stop at F12.
#
# [[bindings]]
# name = "launch Terminal"
# input = "f13"
# action-shell = "open -a Terminal"
#
# [[bindings]]
# name = "launch browser"
# input = "f14"
# action-shell = "open -a Safari"


# =====================================================================
# Pattern 2 — Side mouse buttons
# =====================================================================
# Most ergonomic mice expose `side1` (back) and `side2` (forward).
#
# [[bindings]]
# name = "screenshot selection"
# input = "mouse.side1"
# action-keys = "cmd + shift - 4"
#
# [[bindings]]
# name = "screenshot whole screen"
# input = "shift - mouse.side1"
# action-keys = "cmd + shift - 3"


# =====================================================================
# Pattern 3 — Hyper key shortcuts (cmd+opt+ctrl+shift)
# =====================================================================
# `hyper` is the no-collision modifier popularised by Karabiner.
# Pair with a remapped Caps Lock for one-finger access.
#
# [[bindings]]
# name = "open dotfiles"
# input = "hyper - d"
# action-shell = "code ~/.dotfiles"
#
# [[bindings]]
# name = "lock screen"
# input = "hyper - l"
# action-keys = "cmd + ctrl - q"


# =====================================================================
# Pattern 4 — Emacs / readline-style Ctrl+key remaps (system-wide)
# =====================================================================
# Most apps already have these (Cocoa text fields do); enable here to
# get them in non-Cocoa apps too (Electron, X11, terminal vims, …).
#
# [[bindings]]
# name = "ctrl-b → ←"
# input = "ctrl - b"
# action-keys = "left"
#
# [[bindings]]
# name = "ctrl-f → →"
# input = "ctrl - f"
# action-keys = "right"
#
# [[bindings]]
# name = "ctrl-p → ↑"
# input = "ctrl - p"
# action-keys = "up"
#
# [[bindings]]
# name = "ctrl-n → ↓"
# input = "ctrl - n"
# action-keys = "down"
#
# [[bindings]]
# name = "ctrl-h → backspace"
# input = "ctrl - h"
# action-keys = "backspace"
#
# [[bindings]]
# name = "ctrl-d → forward delete"
# input = "ctrl - d"
# action-keys = "forward_delete"


# =====================================================================
# Aliases — named shell snippets, referenced via `@name`
# =====================================================================
# Lookup is flat: each entry `name = "command"`. Reference from any
# `action-shell` via the single token `@name`. v1 is intentionally
# narrow: no recursion (`alias = "@other"` not supported), no
# argument passing (the `@name arg` syntax is RESERVED — values
# containing whitespace after `@name` are treated as literal command
# strings).
#
# An undefined `@name` reference drops the referring binding with a
# warning of the exact form:
#   warning: binding 'foo' (config.toml:42) references undefined alias '@bar'; binding dropped
# so a typo is loud, not silent.
#
# [aliases]
# rift_focus_next  = "rift-cli execute window next"
# rift_focus_prev  = "rift-cli execute window prev"


# =====================================================================
# Input aliases — named modifier-set chords, bare reference in `input`
# =====================================================================
# `[input-aliases]` lets you give a logical name to a modifier set so
# `input = "..."` can stay readable. Reference is **bare** (no `@`
# prefix), just write the alias name in place of the modifiers:
#
#   [input-aliases]
#   ULTRA_LL   = "rctrl + ralt + rshift"
#   MIRACLE_LM = "rctrl + rcmd + rshift"
#
#   [[bindings]]
#   input = "ULTRA_LL - c"          # = "rctrl + ralt + rshift - c"
#   input = "ULTRA_LL + cmd - m"    # mix with built-in modifiers OK
#
# Constraints:
#   * Body = built-in modifier tokens only (no nested alias references)
#   * Name must not collide with built-in tokens (cmd / ctrl / hyper …)
#   * Names matched case-insensitively at lookup time
#
# Undefined alias references fail the same way as a modifier typo:
# `unknown-input-token` warning, binding dropped.
#
# [input-aliases]
# ULTRA_LL = "rctrl + ralt + rshift"


# =====================================================================
# Pattern 5 — App-scoped overrides
# =====================================================================
# Same chord, different action depending on the frontmost app.
# document order + first-match wins, so put the more-specific
# `apps = [...]` row before the generic one.
#
# [[bindings]]
# name = "ctrl + scroll → zoom (Code only)"
# input = "ctrl - scroll.up"
# apps = ["com.microsoft.VSCode"]
# action-keys = "cmd - equal"
#
# [[bindings]]
# name = "ctrl + scroll → zoom out (Code only)"
# input = "ctrl - scroll.down"
# apps = ["com.microsoft.VSCode"]
# action-keys = "cmd - minus"


# =====================================================================
# Pattern 6 — ZMK / Karabiner strict-side modifier layers
# =====================================================================
# `rctrl + ralt + rshift - x` requires the **right-side** keys held
# (left-side variants must be released). Encodes ZMK ULTRA_LL-style
# strict modifier sets the way the firmware intends.
#
# [[bindings]]
# name = "ULTRA_LL → swap window"
# input = "rctrl + ralt + rshift - tab"
# action-shell = "yabai -m window --focus next 2>/dev/null || true"


# =====================================================================
# Pattern 7 — Disabling keys entirely
# =====================================================================
# Eat an input without posting anything. Common with Caps Lock if you
# remapped it elsewhere and want to suppress stray presses.
#
# [[bindings]]
# name = "block caps lock"
# input = "caps_lock"
# action-noop = true


# =====================================================================
# Pattern 8 — Fallback feedback ([[fallbacks]] section)
# =====================================================================
# `[[fallbacks]]` fires ONLY when no `[[bindings]]` row matched. Use
# `*` as the primary key to match every keyboard key under the given
# modifier set. `*` is rejected inside `[[bindings]]` to keep a
# regular binding from silently swallowing every key.
#
# Canonical use: an audible "no such chord" cue when a layered
# keyboard fires an undefined key under a strict modifier set.
#
# [[fallbacks]]
# name = "ULTRA_LL undefined feedback"
# input = "rctrl + ralt + rshift - *"
# action-shell = "afplay /System/Library/Sounds/Pop.aiff"


# =====================================================================
# Pattern 9 — Leader-key mode with inactivity timeout (recommended)
# =====================================================================
# Vim-style timeoutlen leader. Tap leader to "arm" the layer, then
# tap follow-up keys within the timeout window. Each gated keypress
# extends the timer (B-α reset-on-use), so a sustained editing
# session keeps the layer alive. After 800ms of inactivity the
# variable auto-clears.
#
# Use this form when your keyboard firmware (ZMK macros, Karabiner
# complex_modifications, …) emits modifier chords atomically — i.e.
# the modifiers drop between primary keys at the OS level. Pattern 10
# below (`hold-while`) only works when the modifiers stay physically
# held across keystrokes — many programmable keyboards can't deliver
# that.
#
#   ULTRA_LL + j         → enter j-layer (sets jlayer=1, 800ms timer)
#   ULTRA_LL + k         → Enter         (only when jlayer=1, resets timer)
#   ULTRA_LL + l         → Backspace
#   (no input for 800ms) → jlayer auto-clears
#
# [[bindings]]
# name = "ULTRA_LL + j → arm j-layer"
# input = "rctrl + ralt + rshift - j"
# action-set-var = "jlayer"
# hold-while-timeout = 800
#
# [[bindings]]
# name = "ULTRA_LL + k → Enter (in j-layer)"
# input = "rctrl + ralt + rshift - k"
# when-var = "jlayer"
# action-keys = "return"
#
# [[bindings]]
# name = "ULTRA_LL + l → Backspace (in j-layer)"
# input = "rctrl + ralt + rshift - l"
# when-var = "jlayer"
# action-keys = "backspace"


# =====================================================================
# Pattern 10 — Leader-key mode with modifier hold (Karabiner-style)
# =====================================================================
# Same idea as Pattern 9, but the layer's lifetime is tied to a held
# modifier mask rather than an inactivity timer. Auto-clears the
# moment the modifier drops. Only useful when the modifiers stay
# physically held across keystrokes — i.e. plain software keyboard
# usage, NOT atomic-chord firmware. If unsure, prefer Pattern 9.
#
#   cmd + opt + j        → enter wm-mode (sets wm=1)
#   cmd + opt + k        → maximize         (only when wm=1)
#   cmd + opt + l (down) → snap-left
#   cmd + opt + l (up)   → snap-right       (fires action_on_up)
#   cmd + opt released   → wm cleared
#
# [[bindings]]
# name = "wm: enter (leader)"
# input = "cmd + opt - j"
# action-set-var = "wm"
# hold-while = "cmd + opt"
#
# [[bindings]]
# name = "wm: maximize"
# input = "cmd + opt - k"
# when-var = "wm"
# action-shell = "yabai -m window --grid 1:1:0:0:1:1"
#
# [[bindings]]
# name = "wm: snap left → snap right on release"
# input = "cmd + opt - l"
# when-var = "wm"
# action-shell = "yabai -m window --grid 1:2:0:0:1:1"
# action-shell-on-up = "yabai -m window --grid 1:2:1:0:1:1"
