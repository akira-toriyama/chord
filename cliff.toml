# git-cliff config — generates CHANGELOG.md from Conventional
# Commits. Same shape as stroke / facet's cliff.toml.

[changelog]
header = """
# Changelog
All notable changes to chord are listed below. The format is
[Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and this
project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
{% if version %}
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
## [unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}{% if commit.breaking %} (BREAKING){% endif %}
{% endfor %}
{% endfor %}
"""

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
  { message = "^.*feat",     group = "Features" },
  { message = "^.*fix",      group = "Fixes" },
  { message = "^.*perf",     group = "Performance" },
  { message = "^.*refactor", group = "Refactors" },
  { message = "^.*docs",     group = "Docs" },
  { message = "^.*test",     group = "Tests" },
  { message = "^.*security", group = "Security" },
  { message = "^.*ci|build", group = "Build" },
  { message = "^.*chore",    skip = true },
  { message = "^.*style",    skip = true },
]
