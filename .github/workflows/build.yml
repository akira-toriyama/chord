name: build

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # macos-15 ships Xcode 16+ → Swift 6 toolchain. macos-14 stops at
    # Xcode 15.4 = Swift 5.10, which can't parse our
    # `swift-tools-version:6.0` Package.swift and fails immediately.
    runs-on: macos-15
    # Bounded so a hung `swift build` can't burn 6 h of free macOS minutes.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      # chord-specific: fail fast if the version strings drift across
      # Package/Info.plist/Info.plist.dev before the expensive build.
      - name: check version sync (Swift / Info.plist / Info.plist.dev)
        run: ./scripts/check-version-sync.sh

      # Shared Swift build (setup-xcode + SPM cache + build + test).
      # Consumed as a STEP so the `build` required check name is unchanged.
      - uses: akira-toriyama/.github/actions/swift-build@main

      - name: smoke test (config --validate)
        run: |
          # yabai-style CLI (atelier Phase 3 M4): validate moved under
          # the `config` domain. `--version` stays a top-level carve-out.
          ./.build/release/chord --version
          ./.build/release/chord config --validate || true
