name: build

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # macos-15 ships Xcode 16+ → Swift 6 toolchain. macos-14 stops at
    # Xcode 15.4 = Swift 5.10, which can't parse our
    # `swift-tools-version:6.0` Package.swift and fails immediately.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Show Swift / Xcode version
        run: |
          swift --version
          xcodebuild -version

      - name: check version sync (Swift / Info.plist / Info.plist.dev)
        run: ./scripts/check-version-sync.sh

      - name: swift build
        run: swift build -c release

      - name: swift test
        run: swift test

      - name: smoke test --validate
        run: |
          ./.build/release/chord --version
          ./.build/release/chord --validate || true
