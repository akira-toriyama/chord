name: update-tap

# Thin caller — delegates to the shared reusable at
# akira-toriyama/.github/.github/workflows/update-tap.yml. The bump logic
# (idempotent, anchored url+sha256 sed, pull-rebase) + docs live there; this
# file only declares the trigger and the formula name. Cross-repo write needs
# repo secret HOMEBREW_TAP_TOKEN (a fine-grained PAT with Contents: Read &
# write on homebrew-tap).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to bump (e.g. v0.11.0). Empty → latest published."
        required: false
        default: ""

# Least privilege, made explicit — closes zizmor's excessive-permissions
# finding ahead of the fleet-wide zizmor gate (akira-toriyama/.github t-qbp1).
permissions:
  contents: read

jobs:
  bump:
    uses: akira-toriyama/.github/.github/workflows/update-tap.yml@v1
    with:
      formula: chord
      tag: ${{ github.event.inputs.tag || '' }}
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
