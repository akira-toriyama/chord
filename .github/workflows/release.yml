name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # macos-15 ships Xcode 16+ → Swift 6. Same reason as build.yml.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: swift build (release)
        run: swift build -c release

      - name: package Chord.app
        run: ./package.sh

      - name: tar
        run: |
          mkdir -p dist
          tar czf "dist/chord-${GITHUB_SHA::7}.tar.gz" Chord.app
          shasum -a 256 "dist/chord-${GITHUB_SHA::7}.tar.gz" \
            > "dist/chord-${GITHUB_SHA::7}.tar.gz.sha256"

      - name: Attach artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Upload Chord.app tar.gz + sha256 to the release matching
          # the pushed tag (e.g. v0.5.0). The release itself is
          # expected to exist already — the maintainer creates it
          # manually with handwritten gitmoji notes after the build
          # passes. If the release isn't there yet, log + exit clean
          # so the workflow doesn't create the historic "v0.1.0-dev"
          # rolling draft (intentionally retired).
          #
          # To attach artifacts after a later `gh release create`,
          # either re-run this workflow from the Actions UI or run:
          #   gh release upload "${TAG}" dist/*.tar.gz dist/*.sha256
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              dist/*.tar.gz dist/*.sha256 --clobber
            echo "uploaded artifacts to release $tag"
          else
            echo "release $tag not found — skipping upload."
            echo "create the release manually, then re-run this workflow"
            echo "(or run: gh release upload $tag dist/*.tar.gz dist/*.sha256)"
          fi
