name: Release

# Thin caller of the shared rolling-DRAFT release (atelier Track 3).
# A push to main makes git-cliff compute the next version from Conventional
# Commits and create/update a single DRAFT release (no tag until you Publish
# in the UI). The version-compute + draft-management logic lives once in
# akira-toriyama/.github; this file supplies only chord's name + install
# prose. See that reusable's header for the model. Config: cliff.toml.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no draft; just artifacts)"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    uses: akira-toriyama/.github/.github/workflows/release.yml@main
    with:
      app: Chord
      # chord is yabai-style: `chord config --validate` is the post-build smoke.
      smoke-cmd: config --validate
      dry-run: ${{ github.event.inputs.dry_run == 'true' }}
      install-notes: |
        ## Install

        **Homebrew:**

        ```sh
        brew install akira-toriyama/tap/chord

        # One-time setup so the Accessibility grant persists across upgrades
        $(brew --prefix)/share/chord/setup-signing-cert.sh   # create chord-dev identity
        chord daemon --resign                                 # re-sign + restart

        brew services start chord
        ```

        After every `brew upgrade chord`, run `chord daemon --resign` once —
        Homebrew's build sandbox can't touch your login keychain during
        install, so the bundle is ad-hoc signed and the Accessibility grant
        would otherwise be lost on each upgrade. `chord daemon --resign` swaps
        the ad-hoc signature for the persistent `chord-dev` identity and
        restarts the daemon in one step.

        **Prebuilt (`Chord.zip` below):** ad-hoc signed (not notarized), so
        macOS quarantines it on download. After unzipping:

        ```sh
        xattr -dr com.apple.quarantine Chord.app
        open Chord.app
        ```

        Then grant **Accessibility** to *chord* (System Settings → Privacy &
        Security → Accessibility) and relaunch.

        **Config:** chord reads `~/.config/chord/config.toml`:

        ```sh
        curl --create-dirs -o ~/.config/chord/config.toml \
          https://raw.githubusercontent.com/akira-toriyama/chord/main/config.toml
        ```
